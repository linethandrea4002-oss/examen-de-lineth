<style>
        * { margin: 0; padding: 0; font-family: Arial; }
        body { padding: 20px; background: #3498db; color: white; min-height: 100vh; }
        a { color: white; display: block; margin-bottom: 20px; }
        input { display: block; margin: 10px 0; }
        #vista { margin-top: 20px; width: 100%; height: 500px; }
    </style>
</head>
<body>
    
    
    <input type="date" id="fecha">
    <input type="file" id="pdf" accept=".pdf" onchange="verPDF(this)">
    
    <iframe id="vista"></iframe>

    <script>
        function verPDF(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('vista').src = URL.createObjectURL(file);
            }
        }
    </script>
</body>
