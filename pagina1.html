<!-- pagina2.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <style>
        * { margin: 0; padding: 0; font-family: Arial; }
        body { padding: 20px; background: #3498db; color: white; min-height: 100vh; }
        a { color: white; display: block; margin-bottom: 20px; }
        input { display: block; margin: 10px 0; padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; }
        #contenido { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.2); white-space: pre-wrap; }
    </style>
</head>
<body>
    
    
    
    <input type="email" id="mail" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <input type="file" id="archivo" accept=".txt">
    <button onclick="cargar()">Cargar</button>
    
    <div id="contenido"></div>

    <script>
        function cargar() {
            const file = document.getElementById('archivo').files[0];
            if (!file) return alert('Selecciona un archivo');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const texto = e.target.result;
                console.log(texto);
                document.getElementById('contenido').textContent = texto;
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
