<!-- pagina5.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <style>
        * { margin: 0; padding: 0; font-family: Arial; }
        body { padding: 20px; background: #f39c12; color: white; min-height: 100vh; }
        a { color: white; display: block; margin-bottom: 20px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; }
        #resultado { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    
    <h1>Buscador</h1>
    
    <input type="text" id="buscar" placeholder="Buscar...">
    <button onclick="buscar()">Buscar</button>
    
    <div id="resultado"></div>

    <script>
        const paginas = ['index.html', 'pagina1.html', 'pagina2.html', 'pagina3.html', 'pagina4.html', 'pagina5.html', 'pagina6.html', 'pagina7.html', 'pagina8.html', 'pagina9.html'];
        
        async function buscar() {
            const texto = document.getElementById('buscar').value.toLowerCase();
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = 'Buscando...';
            
            let hallado = '';
            
            for (let pag of paginas) {
                try {
                    const res = await fetch(pag);
                    const html = await res.text();
                    if (html.toLowerCase().includes(texto)) {
                        hallado += `<p>✓ Encontrado en: <a href="${pag}" style="color:white">${pag}</a></p>`;
                    }
                } catch(e) {}
            }
            
            resultado.innerHTML = hallado || 'No se encontraron coincidencias';
        }
    </script>
</body>
</html>
