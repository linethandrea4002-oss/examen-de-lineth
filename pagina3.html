<body>
    
    
    <input type="color" id="color" onchange="document.getElementById('colorBox').style.background=this.value">
    <div id="colorBox"></div>
    
    <input type="file" accept="image/*" onchange="mostrar(this, 'img')">
    <img id="img">
    
    <input type="file" accept="audio/*" onchange="mostrar(this, 'audio')">
    <audio id="audio" controls></audio>
    
    <input type="file" accept="video/*" onchange="mostrar(this, 'video')">
    <video id="video" controls width="300"></video>

    <script>
        function mostrar(input, tipo) {
            const file = input.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const elem = document.getElementById(tipo);
                elem.src = url;
                if (tipo === 'img') elem.style.display = 'block';
            }
        }
    </script>
</body>
